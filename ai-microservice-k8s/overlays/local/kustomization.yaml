apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-microservice

resources:
  - ../../base

patches:
  - path: service-patch.yaml
    target:
      kind: Service
      name: ai-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ai-service

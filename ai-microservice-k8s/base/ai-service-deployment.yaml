apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: ai-microservice
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          # Build from the existing Dockerfile and push to a registry the cluster
          # can pull from, then point this at that image, e.g.:
          #   docker build -t your-registry/ai-microservice:latest .
          #   docker push your-registry/ai-microservice:latest
          image: ai-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secrets
                  key: ANTHROPIC_API_KEY
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: REDIS_URL
            - name: VALID_API_KEYS
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: VALID_API_KEYS
          # NOTE: docker-compose.yml optionally bind-mounts two local repos
          # (aiguardrail-pipeline, aillm-observability) read-only into the
          # container for local module imports. Host path mounts like that
          # aren't portable across a K8s cluster's nodes. If those repos are
          # actually required at runtime (not just commented-out imports in
          # the Dockerfile), bake them into the image at build time instead,
          # or ship them as a separate ConfigMap/init-container artifact.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3 
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true   # Dockerfile already creates & switches to `appuser`
            runAsUser: 1000
      restartPolicy: Always

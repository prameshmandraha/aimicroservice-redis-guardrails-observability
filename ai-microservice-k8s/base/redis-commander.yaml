# Optional debug UI — equivalent to `docker compose --profile debug up`.
# Not included in the base kustomization by default; apply it manually with:
#   kubectl apply -f redis-commander.yaml
# or add it to an overlay's kustomization.yaml resources list.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander
  namespace: ai-microservice
  labels:
    app: redis-commander
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-commander
  template:
    metadata:
      labels:
        app: redis-commander
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          env:
            - name: REDIS_HOSTS
              value: "local:redis-service:6379"
          ports:
            - containerPort: 8081
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-commander
  namespace: ai-microservice
  labels:
    app: redis-commander
spec:
  type: ClusterIP
  selector:
    app: redis-commander
  ports:
    - port: 8081
      targetPort: 8081
      name: http

# ⚠️  TEMPLATE ONLY — do not commit real secrets to source control.
#
# Preferred: create the secret imperatively instead of editing this file:
#
#   kubectl create secret generic ai-service-secrets \
#     --namespace ai-microservice \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-your-actual-key-here
#
# If you must apply this file directly, replace REPLACE_ME with the
# base64-encoded value first:
#
#   echo -n "sk-ant-your-actual-key-here" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secrets
  namespace: ai-microservice
type: Opaque
data:
  ANTHROPIC_API_KEY: REPLACE_ME
